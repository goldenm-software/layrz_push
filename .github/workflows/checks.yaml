name: "Checks"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  lint-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: goldenm-software/layrz-actions/.github/actions/check-dart@v1
        with:
          flutter-version: "3.44.6"
          run-tests: true
          artifact-name: dart-coverage-${{ github.run_id }}

  lint-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint plugin sources
        uses: goldenm-software/layrz-actions/.github/actions/check-kotlin@v1
        with:
          working-directory: android
          run-tests: 'false'

      - name: Run unit tests
        uses: goldenm-software/layrz-actions/.github/actions/check-kotlin@v1
        with:
          working-directory: example/android
          java-version: '21'
          flutter-version: "3.44.6"
          flutter-directory: example
          gradle-task: ':layrz_push:testDebugUnitTest :layrz_push:jacocoDebugReport'
          test-results-path: '../build/layrz_push/test-results'
          coverage-path: '../build/layrz_push/reports/jacoco/jacoco.xml'
          coverage-artifact-name: 'kotlin-coverage'
          run-lint: 'false'

  lint-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: goldenm-software/layrz-actions/.github/actions/check-swift@v1
        with:
          working-directory: example/ios
          flutter-version: "3.44.6"
          flutter-directory: example
          lint-directory: ios/layrz_push/Sources
          coverage-include-pattern: 'layrz_push/Sources'
          coverage-artifact-name: 'swift-coverage'

  coverage:
    needs: [lint-dart, lint-kotlin, lint-swift]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download dart coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: dart-coverage-${{ github.run_id }}
          path: dart-coverage

      - name: Download kotlin coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: kotlin-coverage
          path: kotlin-coverage

      - name: Download swift coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: swift-coverage
          path: swift-coverage

      - uses: goldenm-software/layrz-actions/.github/actions/coverage-comment@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-dart: true
          dart-coverage-path: dart-coverage/lcov.info
          enable-kotlin: true
          kotlin-coverage-path: kotlin-coverage/jacoco.xml
          enable-swift: true
          swift-coverage-path: swift-coverage/lcov.info

      - uses: goldenm-software/layrz-actions/.github/actions/coverage-check@v1
        with:
          enable-dart: true
          dart-coverage-path: dart-coverage/lcov.info
          threshold: '80'
          enable-kotlin: true
          kotlin-coverage-path: kotlin-coverage/jacoco.xml
          # Native suites are storage-focused for now — raise as coverage grows
          kotlin-threshold: '10'
          enable-swift: true
          swift-coverage-path: swift-coverage/lcov.info
          swift-threshold: '10'

  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: goldenm-software/layrz-actions/.github/actions/changelog@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          post-comment: true
